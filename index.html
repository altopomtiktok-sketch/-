<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصتك — منصة الثانوية العامة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#F7F2E9;
  --surface:#FFFFFF;
  --surface-2:#EFE8D8;
  --ink:#1C2624;
  --ink-soft:#5B6462;
  --line:#DCD3BE;
  --brand:#14555A;
  --brand-2:#0D3D41;
  --paper-shadow: 0 1px 0 rgba(28,38,36,.04), 0 8px 24px rgba(28,38,36,.06);
  --ar:#2F9E58; --ph:#C98A16; --ch:#D64545; --bi:#8B5FBF; --en:#2E7FD9;
  --ok:#2F9E58; --bad:#D64545;
  --radius: 14px;
}
body.dark{
  --bg:#0E1A1B;
  --surface:#152526;
  --surface-2:#1C2E2F;
  --ink:#EAF1EE;
  --ink-soft:#9FB0AC;
  --line:#26403F;
  --brand:#3FBFB0;
  --brand-2:#2E948A;
  --paper-shadow: 0 1px 0 rgba(0,0,0,.2), 0 10px 30px rgba(0,0,0,.35);
  --ar:#4CC17E; --ph:#E0A93A; --ch:#E86A6A; --bi:#A984DB; --en:#5B9FE8;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Tajawal',sans-serif;
  transition:background .25s ease, color .25s ease;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Cairo',sans-serif}
.mono{font-family:'IBM Plex Mono',monospace}
a{color:inherit}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--brand); color:#fff;}

.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 22px; background:var(--surface);
  border-bottom:1px solid var(--line);
}
.logo{display:flex; align-items:center; gap:10px; font-family:'Cairo'; font-weight:900; font-size:20px;}
.logo .dot{width:10px;height:10px;border-radius:3px;background:var(--brand); transform:rotate(45deg); display:inline-block;}
.nav{display:flex; gap:4px; flex-wrap:wrap;}
.nav button{
  background:transparent; border:none; color:var(--ink-soft); font-weight:700;
  padding:9px 14px; border-radius:9px; font-size:14px;
}
.nav button.active, .nav button:hover{background:var(--surface-2); color:var(--ink);}
.top-actions{display:flex; align-items:center; gap:8px;}
.icon-btn{
  width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
  background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:17px;
}
.icon-btn:hover{background:var(--surface-2);}

.wrap{max-width:1080px; margin:0 auto; padding:28px 20px 80px;}
.eyebrow{font-family:'Cairo'; font-weight:800; letter-spacing:.06em; font-size:12px; color:var(--brand); text-transform:uppercase;}
.h-title{font-size:30px; font-weight:900; margin:6px 0 22px;}

/* subject / teacher card - "student ID card" signature */
.grid-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;}
.id-card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--paper-shadow); overflow:hidden; text-align:right; position:relative;
  border-inline-end:6px solid var(--c);
  padding:18px 18px 16px; display:flex; flex-direction:column; gap:8px;
  transition:transform .15s ease;
}
.id-card:hover{transform:translateY(-3px);}
.id-card .icon{font-size:30px;}
.id-card .teacher{font-size:12px; color:var(--ink-soft); font-weight:700;}
.id-card .subject{font-family:'Cairo'; font-weight:900; font-size:19px;}
.id-card .meta{font-size:12px; color:var(--ink-soft); margin-top:6px; display:flex; justify-content:space-between; align-items:center;}
.dots{display:flex; gap:5px; flex-direction:row-reverse;}
.dots span{width:8px;height:8px;border-radius:2px; background:var(--line);}
.dots span.done{background:var(--c);}
.dots span.cur{background:var(--c); opacity:.45;}

.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--paper-shadow); padding:20px;}
.tabs{display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid var(--line);}
.tabs button{background:none; border:none; padding:10px 4px; margin-inline-end:18px; font-weight:800; color:var(--ink-soft); border-bottom:2px solid transparent; font-family:'Cairo';}
.tabs button.active{color:var(--brand); border-bottom-color:var(--brand);}

.list-row{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border:1px dashed var(--line); border-radius:10px; margin-bottom:10px; background:var(--surface);}
.list-row .title{font-weight:700;}
.list-row .sub{font-size:12px; color:var(--ink-soft);}
.pill{font-size:12px; padding:4px 10px; border-radius:20px; font-weight:700;}
.pill.open{background:rgba(47,158,88,.14); color:var(--ok);}
.pill.locked{background:rgba(214,69,69,.12); color:var(--bad);}
.btn{
  background:var(--brand); color:#fff; border:none; padding:10px 18px; border-radius:9px;
  font-weight:800; font-size:14px; font-family:'Cairo';
}
.btn:hover{background:var(--brand-2);}
.btn.ghost{background:transparent; color:var(--brand); border:1px solid var(--brand);}
.btn.danger{background:var(--bad);}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn.sm{padding:6px 12px; font-size:12px;}

input,select,textarea{
  width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
  background:var(--surface); color:var(--ink); font-family:'Tajawal'; font-size:14px;
}
label{font-size:12px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:5px;}
.field{margin-bottom:14px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

.q-block{border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:14px; background:var(--surface-2);}
.q-num{font-family:'Cairo'; font-weight:900; color:var(--brand); font-size:13px; margin-bottom:8px;}
.choice{display:flex; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--line); border-radius:9px; margin-bottom:8px; background:var(--surface); cursor:pointer;}
.choice:hover{border-color:var(--brand);}
.choice.picked{border-color:var(--brand); background:rgba(20,85,90,.08);}
.choice input{width:auto;}

.result-badge{display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:30px; font-weight:900; font-family:'Cairo'; font-size:15px;}
.result-badge.pass{background:rgba(47,158,88,.14); color:var(--ok);}
.result-badge.fail{background:rgba(214,69,69,.12); color:var(--bad);}
table{width:100%; border-collapse:collapse; margin-top:14px;}
th,td{padding:10px; text-align:center; border-bottom:1px solid var(--line); font-size:13px;}
th{color:var(--ink-soft); font-size:12px; font-family:'Cairo';}
.note{font-size:12px; color:var(--ink-soft); background:var(--surface-2); padding:8px 10px; border-radius:8px; margin-top:6px;}

.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.bar-label{width:110px; font-size:13px; font-weight:700; flex-shrink:0;}
.bar-track{flex:1; height:16px; background:var(--surface-2); border-radius:8px; overflow:hidden;}
.bar-fill{height:100%; border-radius:8px;}
.bar-val{width:44px; font-size:12px; font-family:'IBM Plex Mono'; text-align:left;}

.modal-bg{position:fixed; inset:0; background:rgba(10,15,15,.55); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;}
.modal{background:var(--surface); border-radius:16px; padding:26px; width:100%; max-width:400px; box-shadow:var(--paper-shadow);}

.empty{text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty .big{font-size:34px; margin-bottom:8px;}
.hint{font-size:12px; color:var(--ink-soft); margin-top:4px;}
.reward-link{display:block; text-align:center; padding:12px; border-radius:10px; font-weight:800; margin-top:14px;}
.reward-link.on{background:rgba(47,158,88,.14); color:var(--ok);}
.reward-link.off{background:var(--surface-2); color:var(--ink-soft);}
.wa-btn{background:#25D366; color:#fff;}
.wa-btn:hover{background:#1ebd5a;}
.back-link{font-size:13px; font-weight:700; color:var(--brand); background:none; border:none; margin-bottom:16px; display:inline-flex; align-items:center; gap:4px;}
.section-title{font-family:'Cairo'; font-weight:900; font-size:16px; margin:0 0 12px;}
.divider{height:1px; background:var(--line); margin:22px 0; border:none;}
.rank-1{color:var(--bad); font-weight:900;}
</style>

  <!-- Download Button Styles -->
  <style>
    .download-btn{
      position:fixed; bottom:20px; left:20px; z-index:200;
      background:linear-gradient(135deg,#14555A,#0D3D41); color:#fff;
      padding:12px 20px; border-radius:12px; font-family:'Cairo',sans-serif;
      font-weight:800; font-size:14px; border:none; cursor:pointer;
      box-shadow:0 4px 15px rgba(20,85,90,.35); display:flex;
      align-items:center; gap:8px; transition:all .2s;
    }
    .download-btn:hover{transform:translateY(-2px); box-shadow:0 6px 20px rgba(20,85,90,.45);}
    .download-btn:active{transform:scale(.95);}
    .download-btn .icon{font-size:18px;}
    .download-btn .text{display:flex; flex-direction:column; align-items:flex-start;}
    .download-btn .text small{font-size:11px; font-weight:500; opacity:.8;}

    /* Install prompt modal */
    .install-modal-bg{position:fixed; inset:0; background:rgba(10,15,15,.7); z-index:300;
      display:none; align-items:center; justify-content:center; padding:20px;}
    .install-modal-bg.show{display:flex;}
    .install-modal{background:var(--surface); border-radius:16px; padding:28px; max-width:380px;
      width:100%; text-align:center; box-shadow:var(--paper-shadow);}
    .install-modal .icon-big{font-size:48px; margin-bottom:12px;}
    .install-modal h2{font-family:'Cairo'; font-weight:900; margin-bottom:8px;}
    .install-modal p{color:var(--ink-soft); margin-bottom:20px; font-size:14px;}
    .install-modal .btn-group{display:flex; gap:10px;}
    .install-modal .btn-group button{flex:1;}

  </style>
</head>
<body>
  <!-- Install Modal -->
  <div class="install-modal-bg" id="installModal">
    <div class="install-modal">
      <div class="icon-big">📲</div>
      <h2>ثبّت منصتك على موبايلك</h2>
      <div id="installInstructions">
        <!-- Content will be set by JS based on device -->
      </div>
      <div class="btn-group" style="margin-top:20px;">

<div id="app"></div>

<script>
const SUBJECTS = [
  {id:'ar', teacher:'محمد صلاح', name:'اللغة العربية', c:'var(--ar)', icon:'📗'},
  {id:'ph', teacher:'عبد المعبود', name:'الفيزياء', c:'var(--ph)', icon:'📙'},
  {id:'ch', teacher:'خالد صقر', name:'الكيمياء', c:'var(--ch)', icon:'📕'},
  {id:'bi', teacher:'الجوهري', name:'الأحياء', c:'var(--bi)', icon:'📔'},
  {id:'en', teacher:'انجلشاوي', name:'اللغة الإنجليزية', c:'var(--en)', icon:'📘'},
];
const ADMIN_PIN = '0122HAmada';
const N_CODES = 15;

let state = {
  view:'home', subjectId:null, examId:null, tab:'videos',
  content:{videos:[], exams:[]}, sdata:{students:[], answers:[]},
  student:null, dark:false, adminOk:false, adminSubTab:'video',
  draftQuestions:[newQ()], examAnswers:{}, lastResult:null,
  loading:true, identifyPurpose:null, parentResult:null,
  accessOk:false, accessCodes:[], gateError:'',
};

function newQ(){ return {text:'', a:'', b:'', c:'', d:'', correct:'a', note:''}; }
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

async function sGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, value, shared){
  try{ await window.storage.set(key, JSON.stringify(value), shared); }catch(e){ console.error('storage set failed', e); }
}

async function boot(){
  // Auto-login check (remember me)
  const savedAccess = localStorage.getItem('edu_access_granted');
  const savedAdmin = localStorage.getItem('edu_admin_granted');
  if(savedAccess === 'true'){
    state.accessOk = true;
    state.adminOk = savedAdmin === 'true';
  }

  const content = await sGet('content', true);
  const sdata = await sGet('students-data', true);
  const prefs = await sGet('prefs', false);
  const access = await sGet('access-codes', true);
  state.content = content || {videos:[], exams:[]};
  // Default demo content
  if(state.content.videos.length === 0 && state.content.exams.length === 0){
    state.content = {
      videos: [
        {id:'v1', title:'الدرس الأول - النحو', subjectId:'ar', driveLink:'https://drive.google.com/drive/folders/arabic-mohamed-salah', createdAt:Date.now()-86400000},
        {id:'v2', title:'الدرس الثاني - الصرف', subjectId:'ar', driveLink:'https://drive.google.com/drive/folders/arabic-mohamed-salah', createdAt:Date.now()-172800000},
        {id:'v3', title:'الدرس الأول - الميكانيكا', subjectId:'ph', driveLink:'https://drive.google.com/drive/folders/physics-abdelmaaboud', createdAt:Date.now()-86400000},
        {id:'v4', title:'الدرس الأول - الكيمياء العضوية', subjectId:'ch', driveLink:'https://drive.google.com/drive/folders/chemistry-khaled-sakr', createdAt:Date.now()-86400000},
        {id:'v5', title:'الدرس الأول - الخلية', subjectId:'bi', driveLink:'https://drive.google.com/drive/folders/biology-elgohary', createdAt:Date.now()-86400000},
        {id:'v6', title:'الدرس الأول - Grammar', subjectId:'en', driveLink:'https://drive.google.com/drive/folders/english-englishawi', createdAt:Date.now()-86400000}
      ],
      exams: [
        {id:'e1', title:'امتحان النحو', subjectId:'ar', lessonNumber:1, passScore:70, rewardLink:'https://drive.google.com/drive/folders/arabic-mohamed-salah',
         questions:[
           {id:'q1', text:'ما هو نوع هذا الاسم؟', a:'مفرد', b:'مثنى', c:'جمع', d:'اسم آلة', correct:'a', note:'الاسم المفرد هو ما دل على واحد'},
           {id:'q2', text:'أي من التالي مرفوع؟', a:'الكتابُ', b:'الكتابَ', c:'الكتابِ', d:'الكتابْ', correct:'a', note:'الرفع بالضمة'}
         ], createdAt:Date.now()-86400000},
        {id:'e2', title:'امتحان الميكانيكا', subjectId:'ph', lessonNumber:1, passScore:70, rewardLink:'https://drive.google.com/drive/folders/physics-abdelmaaboud',
         questions:[
           {id:'q3', text:'ما وحدة القوة في النظام الدولي؟', a:'نيوتن', b:'واط', c:'جول', d:'باسكال', correct:'a', note:'النيوتن = كجم×م/ث²'},
           {id:'q4', text:'السرعة =', a:'المسافة/الزمن', b:'الزمن/المسافة', c:'المسافة×الزمن', d:'الزمن-المسافة', correct:'a', note:'v = d/t'}
         ], createdAt:Date.now()-86400000}
      ]
    };
    await saveContent();
  }
  state.sdata = sdata || {students:[], answers:[]};
  state.accessCodes = (access && Array.isArray(access.codes)) ? access.codes.filter(Boolean) : [];
  // Default access codes (20 codes) - ALWAYS set if not valid
  const validCodes = [
    'MANSATAK-2026-001',
    'MANSATAK-2026-002', 
    'MANSATAK-2026-003',
    'MANSATAK-2026-004',
    'MANSATAK-2026-005',
    'MANSATAK-2026-006',
    'MANSATAK-2026-007',
    'MANSATAK-2026-008',
    'MANSATAK-2026-009',
    'MANSATAK-2026-010',
    'MANSATAK-2026-011',
    'MANSATAK-2026-012',
    'MANSATAK-2026-013',
    'MANSATAK-2026-014',
    'MANSATAK-2026-015',
    'MANSATAK-2026-016',
    'MANSATAK-2026-017',
    'MANSATAK-2026-018',
    'MANSATAK-2026-019',
    'MANSATAK-2026-020'
  ];

  // Check if we have valid codes (not empty, not null, not undefined)
  if(!state.accessCodes || state.accessCodes.length === 0 || !state.accessCodes.some(c => c && c.trim())){
    state.accessCodes = validCodes;
    await saveCodes();
    console.log('✅ Default access codes loaded');
  }
  if(prefs){
    state.dark = !!prefs.dark;
    state.accessOk = !!prefs.accessGranted;
    state.adminOk = !!prefs.adminGranted;
    if(prefs.studentId){
      const found = state.sdata.students.find(s=>s.id===prefs.studentId);
      if(found) state.student = found;
    }
  }
  document.body.classList.toggle('dark', state.dark);
  state.loading = false;
  render();
}

async function saveContent(){ await sSet('content', state.content, true); }
async function saveSdata(){ await sSet('students-data', state.sdata, true); }
async function savePrefs(){ await sSet('prefs', {dark:state.dark, studentId: state.student?state.student.id:null, accessGranted: state.accessOk, adminGranted: state.adminOk}, false); }
async function saveCodes(){ await sSet('access-codes', {codes: state.accessCodes.filter(Boolean)}, true); }

function go(view, extra){ state.view = view; Object.assign(state, extra||{}); render(); window.scrollTo(0,0); }

function subjectExams(subjectId){
  return state.content.exams.filter(e=>e.subjectId===subjectId).sort((a,b)=> (a.lessonNumber||0)-(b.lessonNumber||0) || a.createdAt-b.createdAt);
}
function subjectVideos(subjectId){
  return state.content.videos.filter(v=>v.subjectId===subjectId).sort((a,b)=>a.createdAt-b.createdAt);
}
function hasPassed(studentId, examId){
  return state.sdata.answers.some(a=>a.studentId===studentId && a.examId===examId && a.passed);
}
function examLocked(exam, idx, list){
  if(idx===0) return false;
  const prev = list[idx-1];
  if(!state.student) return true;
  return !hasPassed(state.student.id, prev.id);
}
function studentAttemptsFor(studentId, examId){
  return state.sdata.answers.filter(a=>a.studentId===studentId && a.examId===examId);
}
function bestAttempt(studentId, examId){
  const atts = studentAttemptsFor(studentId, examId);
  if(!atts.length) return null;
  return atts.reduce((best,a)=> (a.percent>best.percent? a: best), atts[0]);
}

/* ---------- RENDER ---------- */
function render(){
  const app = document.getElementById('app');
  if(state.loading){ app.innerHTML = `<div class="wrap"><p>...جارِ التحميل</p></div>`; return; }
  if(!state.accessOk){ app.innerHTML = gateTopbar() + gateView(); bindGateEvents(); return; }
  app.innerHTML = topbarHtml() + viewHtml() + modalHtml();
  bindEvents();
}

function gateTopbar(){
  return `<div class="topbar">
    <div class="logo"><span class="dot"></span> منصتك</div>
    <button class="icon-btn" id="darkToggleGate" title="الوضع الليلي">${state.dark?'☀️':'🌙'}</button>
  </div>`;
}

function gateView(){
  return `<div class="wrap" style="max-width:420px;">
    <div class="eyebrow">اشتراك مدفوع</div>
    <h1 class="h-title">أدخل كود الاشتراك للدخول</h1>
    <div class="card">
      <div class="field"><label>كود الاشتراك</label><input id="gateCode" placeholder="اكتب الكود اللي معاك" style="text-align:center; letter-spacing:2px; font-weight:700;"/></div>
      ${state.gateError? `<div class="note" style="color:var(--bad); background:rgba(214,69,69,.1);">${state.gateError}</div>`:''}
      <button class="btn" id="gateSubmit" style="width:100%; margin-top:8px;">دخول</button>
      <div class="hint" style="margin-top:12px;">الكود بتاخده بعد الاشتراك في المنصة. لو معندكش كود، تواصل مع إدارة المنصة.</div>
    </div>
  </div>`;
}

function bindGateEvents(){
  document.getElementById('darkToggleGate').onclick = ()=>{ state.dark=!state.dark; document.body.classList.toggle('dark',state.dark); savePrefs(); render(); };
  const submit = document.getElementById('gateSubmit');
  const input = document.getElementById('gateCode');
  const tryEnter = async ()=>{
    const raw = input.value.trim();
    const val = raw.toUpperCase();
    if(!val){ state.gateError='من فضلك اكتب الكود.'; render(); return; }
    if(raw === ADMIN_PIN){
      state.accessOk = true; state.adminOk = true; state.gateError='';
      // Save admin login permanently
      localStorage.setItem('edu_access_granted', 'true');
      localStorage.setItem('edu_admin_granted', 'true');
      localStorage.setItem('edu_login_time', Date.now().toString());
      await savePrefs();
      render(); return;
    }

    // Check if already logged in before
    const alreadyGranted = localStorage.getItem('edu_access_granted');
    if(alreadyGranted === 'true'){
      state.accessOk = true;
      state.adminOk = localStorage.getItem('edu_admin_granted') === 'true';
      state.gateError='';
      await savePrefs();
      render(); return;
    }
    const access = await sGet('access-codes', true);
    let list = (access && Array.isArray(access.codes)) ? access.codes.filter(Boolean).map(c=>c.trim().toUpperCase()) : [];

    // If no codes in storage, use hardcoded defaults
    if(list.length === 0){
      list = [
        'MANSATAK-2026-001','MANSATAK-2026-002','MANSATAK-2026-003',
        'MANSATAK-2026-004','MANSATAK-2026-005','MANSATAK-2026-006',

        'MANSATAK-2026-010','MANSATAK-2026-011','MANSATAK-2026-012',

        'MANSATAK-2026-016','MANSATAK-2026-017','MANSATAK-2026-018',
        'MANSATAK-2026-019','MANSATAK-2026-020'
      ];
    }
    if(list.includes(val)){
      state.accessOk = true; state.gateError='';
      await savePrefs();
      render();
    } else {
      state.gateError='الكود غير صحيح، تأكد منه أو تواصل مع الأدمن.';
      render();
    }
  };

}

function pieChart(rows){
  const total = rows.reduce((a,r)=>a+Math.max(r.pct,1),0) || 1;
  let acc=0;
  const R=70,CX=90,CY=90;
  const paths = rows.map(r=>{
    const val = Math.max(r.pct,1);
    const frac = val/total;
    const start = acc*2*Math.PI; acc+=frac; const end=acc*2*Math.PI;
    const x1=CX+R*Math.sin(start), y1=CY-R*Math.cos(start);
    const x2=CX+R*Math.sin(end), y2=CY-R*Math.cos(end);
    const large = (end-start)>Math.PI?1:0;
    return `<path d="M${CX},${CY} L${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} Z" fill="${r.s.c}" opacity="0.88"/>`;
  }).join('');
  return `<svg viewBox="0 0 180 180" width="180" height="180" style="display:block;margin:0 auto;">${paths}</svg>
    <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:10px;">
      ${rows.map(r=>`<span class="hint" style="display:flex; align-items:center; gap:4px;"><span style="width:9px;height:9px;background:${r.s.c};border-radius:2px; display:inline-block;"></span>${r.s.name}</span>`).join('')}
    </div>`;
}

function modalHtml(){ return ''; }

/* ---------- EVENTS ---------- */
function bindEvents(){
  document.getElementById('darkToggle').onclick = ()=>{ state.dark=!state.dark; document.body.classList.toggle('dark',state.dark); savePrefs(); render(); };

  // Logout button
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = ()=>{
    if(confirm('هل تريد تسجيل الخروج؟')){
      // Clear all saved login data
      localStorage.removeItem('edu_access_granted');
      localStorage.removeItem('edu_admin_granted');
      localStorage.removeItem('edu_login_time');
      localStorage.removeItem('edu_prefs');
      localStorage.removeItem('edu_student');
      // Reset state
      state.accessOk = false;
      state.adminOk = false;
      state.student = null;
      state.view = 'home';
      // Reload page
      window.location.reload();
    }
  };
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick = ()=>{
    const v = el.dataset.nav;
    if(v==='subject'){ go('subject',{subjectId: el.dataset.backSubject, tab:'exams'}); return; }
    if(v==='admin'){ go('admin'); return; }
    if(v==='stats'||v==='parent'){ go(v,{parentResult:null}); return; }
    go(v);
  });
  document.querySelectorAll('[data-open-subject]').forEach(el=>el.onclick=()=>go('subject',{subjectId:el.dataset.openSubject, tab:'videos'}));
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{ state.tab=el.dataset.tab; render(); });

  document.querySelectorAll('[data-start-exam]').forEach(el=>el.onclick=()=>{
    const examId = el.dataset.startExam;
    if(!state.student){
      pendingExamId = examId;
      openIdentifyModal(()=>{ startExam(examId); });
    } else { startExam(examId); }
  });

  document.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{
    const [qId,choice] = el.dataset.pick.split('|');
    state.examAnswers[qId] = choice;
    render();
  });
  const submitBtn = document.getElementById('submitExam');
  if(submitBtn) submitBtn.onclick = submitExam;

  const waBtn = document.getElementById('sendWa');
  if(waBtn) waBtn.onclick = ()=>{ window.open(state.lastResult.waLink,'_blank'); };

  // stats identify
  const idSubmit = document.getElementById('idSubmit');
  if(idSubmit) idSubmit.onclick = async ()=>{
    const name = document.getElementById('idName').value.trim();
    const phone = document.getElementById('idPhone').value.trim();
    if(!name){ alert('من فضلك اكتب اسمك'); return; }
    await identifyStudent(name, phone);
    render();
  };

  // parent
  const pSearch = document.getElementById('parentSearch');
  if(pSearch) pSearch.onclick = async ()=>{
    const name = document.getElementById('pName').value.trim();
    const phone = document.getElementById('pPhone').value.trim();
    if(!name||!phone){ alert('من فضلك أدخل الاسم ورقم الواتساب'); return; }
    let found = state.sdata.students.find(s=>s.name===name && s.phone===phone);
    if(!found){
      found = {id:uid(), name, phone};
      state.sdata.students.push(found);
      await saveSdata();
    }
    state.parentResult = found;
    render();
  };
  const pBack = document.getElementById('parentBack');
  if(pBack) pBack.onclick = ()=>{ state.parentResult=null; render(); };

  // admin
  const adminLogin = document.getElementById('adminLogin');
  if(adminLogin) adminLogin.onclick = ()=>{
    const v = document.getElementById('adminPin').value;
    if(v===ADMIN_PIN){ state.adminOk=true; render(); } else { alert('رمز غير صحيح'); }
  };
  document.querySelectorAll('[data-atab]').forEach(el=>el.onclick=()=>{ state.adminSubTab=el.dataset.atab; render(); });

  const addVideo = document.getElementById('addVideo');
  if(addVideo) addVideo.onclick = async ()=>{
    const title = document.getElementById('vTitle').value.trim();
    const subjectId = document.getElementById('vSubject').value;
    const link = document.getElementById('vLink').value.trim();
    if(!title||!link){ alert('من فضلك أكمل كل الحقول'); return; }
    state.content.videos.push({id:uid(), title, subjectId, driveLink:link, createdAt:Date.now()});
    await saveContent();
    document.getElementById('vTitle').value=''; document.getElementById('vLink').value='';
    alert('تم حفظ الفيديو ✅');
  };

  const addQuestion = document.getElementById('addQuestion');
  if(addQuestion) addQuestion.onclick = ()=>{ state.draftQuestions.push(newQ()); render(); };
  document.querySelectorAll('[data-rmq]').forEach(el=>el.onclick=()=>{
    state.draftQuestions.splice(parseInt(el.dataset.rmq),1); render();
  });
  document.querySelectorAll('[data-qf]').forEach(el=>{
    const fn = el.tagName==='SELECT'?'onchange':'oninput';
    el[fn] = ()=>{ state.draftQuestions[parseInt(el.dataset.qidx)][el.dataset.qf] = el.value; };
  });

  const saveExam = document.getElementById('saveExam');
  if(saveExam) saveExam.onclick = async ()=>{
    const title = document.getElementById('eTitle').value.trim();
    const subjectId = document.getElementById('eSubject').value;
    const lessonNumber = parseInt(document.getElementById('eLesson').value)||1;
    const passScore = parseInt(document.getElementById('ePass').value)||70;
    const rewardLink = document.getElementById('eReward').value.trim();
    const qs = state.draftQuestions.filter(q=>q.text.trim());
    if(!title || !qs.length){ alert('من فضلك أدخل اسم الامتحان وسؤال واحد على الأقل'); return; }
    const exam = {id:uid(), title, subjectId, lessonNumber, passScore, rewardLink,
      questions: qs.map(q=>({id:uid(), ...q})), createdAt:Date.now()};
    state.content.exams.push(exam);
    await saveContent();
    state.draftQuestions = [newQ()];
    alert('تم حفظ الامتحان ✅');
    render();
  };

  document.querySelectorAll('[data-codeidx]').forEach(el=>{
    el.oninput = ()=>{ state.accessCodes[parseInt(el.dataset.codeidx)] = el.value; };
  });
  const saveCodesBtn = document.getElementById('saveCodes');
  if(saveCodesBtn) saveCodesBtn.onclick = async ()=>{ await saveCodes(); alert('تم حفظ الأكواد ✅'); };

  document.querySelectorAll('[data-delvideo]').forEach(el=>el.onclick=async ()=>{
    state.content.videos = state.content.videos.filter(v=>v.id!==el.dataset.delvideo);
    await saveContent(); render();
  });
  document.querySelectorAll('[data-delexam]').forEach(el=>el.onclick=async ()=>{
    state.content.exams = state.content.exams.filter(e=>e.id!==el.dataset.delexam);
    await saveContent(); render();
  });
}

let pendingExamId = null;
function openIdentifyModal(onDone){
  const bg = document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML = `<div class="modal">
    <h2 style="margin-top:0;">من فضلك عرّف نفسك أولاً</h2>
    <div class="field"><label>اسمك بالكامل</label><input id="mName" placeholder="اكتب اسمك"/></div>
    <div class="field"><label>رقم واتساب ولي الأمر (اختياري)</label><input id="mPhone" placeholder="01xxxxxxxxx"/></div>
    <button class="btn" id="mSubmit" style="width:100%;">بدء الامتحان</button>
  </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#mSubmit').onclick = async ()=>{
    const name = bg.querySelector('#mName').value.trim();
    const phone = bg.querySelector('#mPhone').value.trim();
    if(!name){ alert('من فضلك اكتب اسمك'); return; }
    await identifyStudent(name, phone);
    document.body.removeChild(bg);
    onDone();
  };
}

async function identifyStudent(name, phone){
  let found = state.sdata.students.find(s=>s.name===name && (!phone || s.phone===phone));
  if(!found){
    found = {id:uid(), name, phone};
    state.sdata.students.push(found);
    await saveSdata();
  }
  state.student = found;
  await savePrefs();
}

function startExam(examId){
  state.examAnswers = {};
  go('exam',{examId});
}

async function submitExam(){
  const exam = state.content.exams.find(e=>e.id===state.examId);
  const rows = exam.questions.map(q=>{
    const selected = state.examAnswers[q.id];
    const isCorrect = selected===q.correct;
    return {qId:q.id, selected, correct:q.correct, isCorrect, note:q.note};
  });
  const score = rows.filter(r=>r.isCorrect).length;
  const total = rows.length;
  const percent = Math.round((score/total)*100);
  const passed = percent >= exam.passScore;
  const attempt = {id:uid(), studentId: state.student.id, examId: exam.id, subjectId: exam.subjectId,
    score, total, percent, passed, date: Date.now(),
    wrongQuestions: rows.map((r,i)=>!r.isCorrect? (i+1): null).filter(Boolean)};
  state.sdata.answers.push(attempt);
  await saveSdata();

  const s = SUBJECTS.find(x=>x.id===exam.subjectId);
  let waLink = null;
  if(state.student.phone){
    const msg = `منصتك: نتيجة ${state.student.name}\nالمادة: ${s.name} (${s.teacher})\nالامتحان: ${exam.title}\nالدرجة: ${score} من ${total}\nالحالة: ${passed?'ناجح ✅':'راسب ❌'}${attempt.wrongQuestions.length? '\nالأخطاء في الأسئلة: '+attempt.wrongQuestions.join('، '):''}`;
    const digits = state.student.phone.replace(/\D/g,'');
    waLink = `https://wa.me/${digits}?text=${encodeURIComponent(msg)}`;
  }
  state.lastResult = {examId: exam.id, score, total, passed, rows, waLink};
  go('result');
}

boot();

// Detect device type
function getDeviceType() {
  const ua = navigator.userAgent;
  if (/iPad|iPhone|iPod/.test(ua)) return 'ios';
  if (/Android/.test(ua)) return 'android';
  return 'desktop';
}

function showInstallModal() {
  const modal = document.getElementById('installModal');

  const device = getDeviceType();

  if (device === 'ios') {
    instructions.innerHTML = `
      <p style="text-align:right; line-height:1.8;">
